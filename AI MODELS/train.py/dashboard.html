<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neb AI - Futuristic Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <div class="container">
        <!-- Side Navigation -->
        <aside class="sidenav">
            <div class="logo">
                <img src="img/logo.png" alt="Neb.ai Logo">
                <span>Neb AI</span>
            </div>
            <ul>
                <li><i class="fas fa-home"></i> <a href="#">Home</a></li>
                <li><i class="fas fa-chart-line"></i> <a href="#">Dashboard</a></li>
                <li><i class="fas fa-history"></i> <a href="#">History</a></li>
            </ul>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <section class="intro">
                <h1>Welcome to Neb AI</h1>
                <p>Your intelligent plant analysis assistant. Chat with Neb AI to get started!</p>
            </section>

            <section class="chat-section">
                <!-- Conversation Area -->
                <div class="chat-box">
                    <div class="chat-message ai-message">
                        <p>Hello, I'm Neb AI. How can I help you today?</p>
                    </div>
                    <div class="chat-message user-message">
                        <p>Can you analyze this plant leaf for me?</p>
                    </div>
                </div>

                <!-- Message Input Area -->
                <div class="message-input">
                    <input type="text" placeholder="Type your message...">
                    <button id="send-message"><i class="fas fa-paper-plane"></i></button>
                    
                       <input type="file" accept="image/*" id="image-input" style="display:none;" />
                  <!-- Custom button to trigger file input -->
             
                    <button id="custom-button" class="analyze-image"><i class="fas fa-image"></i> Analyze Image</button>
                  
                        
             <p id="file-name">No file chosen</p>
        
                            
                    
                </div>
            </section>
        </main>
    </div>

    <!-- Scripts -->
    <script>
       
    </script> 

    <script src="https://cdnjs.cloudflare.com/ajax/libs/tensorflow/4.21.0/tf.min.js" type="text/javascript"></script>
    
    <!--  Javascript for page functionality -->
    <script type="module" src="js/dashboard.js"></script>
    
    <!-- JavaScript Model funtionality -->
    <script type="module" src="analysis.js"></script>
    
</body>
</html>
